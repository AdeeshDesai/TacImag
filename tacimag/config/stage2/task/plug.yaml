name: plug
dataset_path: data/plug_quan_Aug02
isaacgym_cfg_name: isaacgym_config_power_plug.yaml

env_runner:
  _target_: manifeel.env_runner.vistac_pih_runner_unit.ManifeelRunner
  shape_meta: ${shape_meta}
  isaacgym_cfg_name: ${task.isaacgym_cfg_name}
  n_test: 50
  n_test_vis: 2
  test_start_seed: 100000
  max_steps: 500
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  fps: 10
  past_action: ${past_action_visible}
  tactile_size: [256, 256]

dataset:
  _target_: manifeel.dataset.manifeel_dataset_equidp.ManifeelDataset
  shape_meta: ${shape_meta}
  zarr_path: ${task.dataset_path}
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: ${n_demo}
